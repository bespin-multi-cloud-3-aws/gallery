name: "Gallery Review"

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]
    paths: ["gallery5/infra/*.tf"]

# 전역 permissions가 꼬이지 않도록, 안전하게 개별 Job 단위로 권한을 하향 조정/재명시
permissions:
  contents: read

env:
  TF_VERSION: "1.14.7"
  AWS_REGION: "ap-northeast-2"
  WORKING_DIR: "gallery5/infra"

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Format Check
        run: terraform fmt -check -recursive

      # -backend=false 옵션을 주면 AWS 로그인 없이 로컬에서 초기화가 가능
      - name: Terraform Init (Validation only)
        run: terraform init

      - name: Validate
        run: terraform validate

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      # 옵션으로 에러 나도 멈추지 않게 설정
      - name: Run TFLint
        run: tflint --init && tflint --recursive --minimum-failure-severity=error

      - name: Security Scan
        uses: aquasecurity/tfsec-action@v1.0.3
        # tfsec 자체가 뻗어도 전체 배포를 멈추지 않게 설정
        # tfsec에서 check 블록을 해석 못하는 오류 발생
        continue-on-error: true
        with:
          working_directory: ${{ env.WORKING_DIR }}
          soft_fail: true

  review-dev:
    needs: quality-gate # 위의 문법 검사(Quality-Gate)가 100% 통과해야만 실행됩니다.
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
        
    # AWS 로그인을 실제로 수행하는 이 Job 내부에 권한을 직접 명시해 주어야 합니다.
    # 그래야 가상 서버가 AWS용 OIDC 임시 보안 토큰(id-token: write)을 완벽하게 낚아챕니다.
    permissions:
      contents: read
      id-token: write       # AWS configure-aws-credentials 액션이 정상 작동하기 위한 필수 치트키
      pull-requests: write  # 아래의 script 액션이 PR에 댓글을 달 수 있도록 허용하는 권한
    
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_IAMROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init

      # 실제 AWS를 건드리지 않고, 무엇이 추가(Add)/변경(Change)/삭제(Destroy)되는지 계획서만 뽑아냅니다.
      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color

      # [선택 사항] 시각적 리뷰 편의성: Plan 결과물 요약본을 개발자가 PR 창에서 바로 보게끔 댓글로 박아줍니다.
      - name: Post Plan to Pull Request
        uses: actions/github-script@v7
        if: always() # 실패하더라도 로그 확인용으로 무조건 댓글이 달리게 설정
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `#### Terraform Format and Style 🖌
            #### Terraform Initialization ⚙️
            #### Terraform Plan 🚀
            
            <details><summary>Show Plan Result</summary>
            
            \`\`\`terraform
            ${{ steps.plan.outputs.stdout }}
            \`\`\`
            
            </details>`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

    # always()방식으로 대체
    #   - name: Fail if Plan Failed
    #     if: steps.plan.outcome == 'failure'
    #     run: exit 1