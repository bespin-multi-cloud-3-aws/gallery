name: gallery-1 review

on:
  pull_request:   #trigger: PR 생성시
    branches: [main]
    types: [opened, synchronize]
    paths: ["lab01/infra/*.tf"]

env:
  TF_VERSION: "1.14.7"
  WORKING_DIR: "lab01/infra"

jobs:
  my_plan:           #job 정의
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        id: plan
        run: terraform plan

      - name: Fail if Plan Failed
        if: steps.plan.outcome == 'failure'
        run: exit 1